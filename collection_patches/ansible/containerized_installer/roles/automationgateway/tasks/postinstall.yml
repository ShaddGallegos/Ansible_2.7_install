---
- name: Wait for automation gateway readiness
  block:
    - name: Wait for automation gateway service port to accept local connections
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _gateway_port }}"
        delay: 10
        timeout: 600
        connect_timeout: 5

    - name: Ensure automation gateway is ready
      ansible.builtin.uri:
        url: "{{ _gateway_protocol }}://{{ _gateway_hostname | ansible.containerized_installer.ipv6_wrap }}:{{ _gateway_port }}/api/gateway/v1/ping/"
        validate_certs: true
        ca_path: "{{ _ca_tls_dir }}/extracted/pem/tls-ca-bundle.pem"
      register: automationgateway_ready
      until: automationgateway_ready.status == 200
      retries: 30
      delay: 10
  rescue:
    - name: Gather automation gateway container status
      ansible.builtin.command:
        cmd: "podman ps -a --filter name=automation-gateway --format '{{ '{{.Names}} {{.Status}}' }}'"
      register: automationgateway_container_status
      changed_when: false
      failed_when: false

    - name: Gather automation gateway container logs
      ansible.builtin.command:
        cmd: podman logs --tail 200 automation-gateway
      register: automationgateway_container_logs
      changed_when: false
      failed_when: false

    - name: Gather automation gateway proxy container logs
      ansible.builtin.command:
        cmd: podman logs --tail 200 automation-gateway-proxy
      register: automationgateway_proxy_container_logs
      changed_when: false
      failed_when: false

    - name: Fail with automation gateway readiness diagnostics
      ansible.builtin.fail:
        msg: |
          Automation Gateway did not become ready on {{ _gateway_protocol }}://{{ _gateway_hostname }}:{{ _gateway_port }}.
          Container status:
          {{ automationgateway_container_status.stdout | default('n/a') }}

          Last readiness response:
          {{ automationgateway_ready.msg | default(automationgateway_ready.content | default('n/a')) }}

          automation-gateway logs (tail 200):
          {{ automationgateway_container_logs.stdout | default('n/a') }}

          automation-gateway-proxy logs (tail 200):
          {{ automationgateway_proxy_container_logs.stdout | default('n/a') }}

- name: Register services
  environment:
    SSL_CERT_FILE: "{{ _ca_tls_dir }}/extracted/pem/tls-ca-bundle.pem"
  run_once: true
  module_defaults:
    group/ansible.platform.gateway:
      gateway_hostname: "{{ _gateway_protocol }}://{{ _gateway_hostname | ansible.containerized_installer.ipv6_wrap }}:{{ _gateway_port }}"
      gateway_username: "{{ gateway_admin_user }}"
      gateway_password: "{{ gateway_admin_password }}"
      gateway_validate_certs: true
  block:
    - name: Update automation platform gateway settings
      ansible.platform.settings:
        settings: "{{ gateway_proxy_vars.gateway_settings }}"

    - name: Update automation platform gateway http ports
      ansible.platform.http_port:
        name: "{{ item.name }}"
        number: "{{ item.number }}"
        use_https: "{{ item.use_https }}"
        is_api_port: "{{ item.is_api_port }}"
      loop: "{{ gateway_proxy_vars.gateway_http_ports }}"

    - name: Update automation platform gateway service type
      ansible.platform.service_type:
        name: "{{ item.name }}"
        ping_url: "{{ item.ping_url | default(omit) }}"
        login_path: "{{ item.login_path | default(omit) }}"
        logout_path: "{{ item.logout_path | default(omit) }}"
        service_index_path: "{{ item.service_index_path | default(omit) }}"
      loop: "{{ gateway_proxy_vars.gateway_service_types }}"

    - name: Update automation platform gateway service clusters
      ansible.platform.service_cluster:
        name: "{{ item.name }}"
        service_type: "{{ item.service_type }}"
      loop: "{{ gateway_proxy_vars.gateway_service_clusters }}"

    - name: Update automation platform gateway service nodes
      ansible.platform.service_node:
        name: "{{ item.name }}"
        address: "{{ item.address }}"
        service_cluster: "{{ item.service_cluster }}"
        tags: "{{ item.tags | default(omit) }}"
      loop: "{{ gateway_proxy_vars.gateway_service_nodes }}"

    - name: Update automation platform gateway services
      ansible.platform.service:
        name: "{{ item.name }}"
        api_slug: "{{ item.api_slug }}"
        http_port: "{{ item.http_port }}"
        service_cluster: "{{ item.service_cluster }}"
        is_service_https: "{{ item.is_service_https }}"
        service_path: "{{ item.service_path }}"
        service_port: "{{ item.service_port }}"
        order: "{{ item.order }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth | default(omit) }}"
        request_timeout_seconds: "{{ item.request_timeout_seconds | default(omit) }}"
        idle_timeout_seconds: "{{ item.idle_timeout_seconds | default(omit) }}"
      loop: "{{ gateway_proxy_vars.gateway_services }}"

    - name: Gather Service Nodes
      containers.podman.podman_container:
        name: automation-gateway-init
        image: "{{ _gateway_image }}"
        command: "aap-gateway-manage list_services"
        detach: false
        rm: true
        log_driver: "{{ container_log_driver }}"
        user: "{{ ansible_user_uid }}"
        userns: keep-id
        network: host
        mount:
          - "type=tmpfs,destination=/var/cache/ansible-automation-platform/gateway,U=true"
        secrets: "{{ _django_secrets }}"
        volume: "{{ _web_volumes }}"
        env: "{{ _common_env }}"
      register: automationgateway_list_services

    - name: Set current service nodes facts
      ansible.builtin.set_fact:
        automationgateway_current_service_nodes: >-
          {{ automationgateway_list_services.stdout_lines
             | select('match', '^\s*node:')
             | map('regex_replace', '^\s*node:\s*(.*)', '\1')
             | list }}

    - name: Update automation platform gateway service nodes
      ansible.platform.service_node:
        name: "{{ item }}"
        state: absent
      with_items: "{{ automationgateway_current_service_nodes }}"
      when:
        - item not in gateway_proxy_vars.gateway_service_nodes | map(attribute='name') | list

    - name: Update automation platform gateway routes
      ansible.platform.route:
        name: "{{ item.name }}"
        description: "{{ item.description }}"
        gateway_path: "{{ item.gateway_path }}"
        service_path: "{{ item.service_path }}"
        http_port: "{{ item.http_port }}"
        is_service_https: "{{ item.is_service_https }}"
        service_cluster: "{{ item.service_cluster }}"
        service_port: "{{ item.service_port }}"
        enable_gateway_auth: "{{ item.enable_gateway_auth }}"
        enable_mtls: "{{ item.enable_mtls | default(omit) }}"
