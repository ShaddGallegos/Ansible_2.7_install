---
- name: Initialize the automation gateway database
  containers.podman.podman_container:
    name: automation-gateway-init
    image: "{{ _gateway_image }}"
    command: "aap-gateway-manage migrate --noinput"
    systemd: false
    detach: false
    rm: true
    log_driver: "{{ container_log_driver }}"
    user: "{{ ansible_user_uid }}"
    userns: keep-id
    network: host
    mount:
      - "type=tmpfs,destination=/var/cache/ansible-automation-platform/gateway,U=true"
    secrets: "{{ _django_secrets }}"
    volume: "{{ _web_volumes }}"
    env: "{{ _common_env }}"
  register: automationgateway_migrate
  changed_when: "'No migrations to apply' not in automationgateway_migrate.stdout"
  run_once: true
  retries: 5
  delay: 60
  until: automationgateway_migrate is not failed

- name: Create django super user
  containers.podman.podman_container:
    name: automation-gateway-init
    image: "{{ _gateway_image }}"
    command: >-
      aap-gateway-manage createsuperuser --username={{ gateway_admin_user }}
      --email={{ gateway_admin_email }} --noinput
    systemd: false
    detach: false
    rm: true
    log_driver: "{{ container_log_driver }}"
    user: "{{ ansible_user_uid }}"
    userns: keep-id
    network: host
    mount:
      - "type=tmpfs,destination=/var/cache/ansible-automation-platform/gateway,U=true"
    secrets: "{{ _django_secrets }}"
    volume: "{{ _web_volumes }}"
    env: "{{ _common_env }}"
  register: automationgateway_createsuperuser
  changed_when: "'Superuser created successfully' in automationgateway_createsuperuser.stdout"
  failed_when:
    - "'That username is already taken' not in automationgateway_createsuperuser.stderr"
    - "'Superuser created successfully' not in automationgateway_createsuperuser.stdout"
  run_once: true
  retries: 5
  delay: 60
  until: automationgateway_createsuperuser is not failed

- name: Update django super user password
  containers.podman.podman_container:
    name: automation-gateway-init
    image: "{{ _gateway_image }}"
    command: >-
      aap-gateway-manage update_password --username={{ gateway_admin_user }}
      --password={{ gateway_admin_password }}
    systemd: false
    detach: false
    rm: true
    log_driver: "{{ container_log_driver }}"
    user: "{{ ansible_user_uid }}"
    userns: keep-id
    network: host
    mount:
      - "type=tmpfs,destination=/var/cache/ansible-automation-platform/gateway,U=true"
    secrets: "{{ _django_secrets }}"
    volume: "{{ _web_volumes }}"
    env: "{{ _common_env }}"
  register: automationgateway_updatesuperuser
  changed_when: "'Password updated' in automationgateway_updatesuperuser.stdout"
  failed_when:
    - automationgateway_updatesuperuser is failed
    - not "'User matching query does not exist' in automationgateway_updatesuperuser.stderr"
  no_log: true
  run_once: true
  retries: 5
  delay: 30
  until: automationgateway_updatesuperuser is not failed

- name: Initialize authenticators
  containers.podman.podman_container:
    name: automation-gateway-init
    image: "{{ _gateway_image }}"
    command: "aap-gateway-manage authenticators --initialize"
    systemd: false
    detach: false
    rm: true
    log_driver: "{{ container_log_driver }}"
    user: "{{ ansible_user_uid }}"
    userns: keep-id
    network: host
    mount:
      - "type=tmpfs,destination=/var/cache/ansible-automation-platform/gateway,U=true"
    secrets: "{{ _django_secrets }}"
    volume: "{{ _web_volumes }}"
    env: "{{ _common_env }}"
  register: automationgateway_authenticators
  changed_when: "'Created default local authenticator' in automationgateway_authenticators.stdout"
  run_once: true
  retries: 5
  delay: 60
  until: automationgateway_authenticators is not failed
