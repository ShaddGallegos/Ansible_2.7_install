---
- name: Set postgresql facts
  ansible.builtin.include_tasks: facts.yml

- name: Configure podman secrets
  ansible.builtin.include_tasks: secrets.yml

- name: Create podman volumes
  ansible.builtin.include_tasks: volumes.yml
  vars:
    __volume_state: present

- name: Configure postgresql
  ansible.builtin.include_tasks: config.yml

- name: Configure TLS
  ansible.builtin.include_tasks: tls.yml
  when: not postgresql_disable_tls | bool

- name: Handle container image update
  ansible.builtin.include_tasks: update.yml

- name: Configure containers
  ansible.builtin.include_tasks: containers.yml

- name: Ensure postgresql container is enabled and started
  ansible.builtin.include_tasks: systemd.yml
  vars:
    __systemd_enabled: true
    __systemd_state: started

- name: Check postgresql user service active state
  ansible.builtin.command:
    cmd: systemctl --user is-active postgresql.service
  register: postgresql_service_active
  changed_when: false
  failed_when: false

- name: Check postgresql user service enabled state
  ansible.builtin.command:
    cmd: systemctl --user is-enabled postgresql.service
  register: postgresql_service_enabled
  changed_when: false
  failed_when: false

- name: Remediate postgresql user service when not active or enabled
  ansible.builtin.include_tasks: systemd.yml
  vars:
    __systemd_enabled: true
    __systemd_state: started
  when:
    - postgresql_service_active.rc != 0 or postgresql_service_enabled.rc != 0

- name: Start postgresql container on database node
  containers.podman.podman_container:
    name: postgresql
    state: started
  register: postgresql_container_start
  failed_when: false

- name: Verify postgresql container is running on database node
  containers.podman.podman_container_info:
    name: postgresql
  register: postgresql_container_runtime_info
  changed_when: false
  failed_when: false
  retries: 12
  delay: 5
  until:
    - postgresql_container_runtime_info.containers is defined
    - postgresql_container_runtime_info.containers | length > 0
    - postgresql_container_runtime_info.containers[0].State.Running | default(false) | bool

- name: Gather postgresql container status when not running
  ansible.builtin.command:
    cmd: "podman ps -a --filter name=postgresql --format '{{ '{{.Names}} {{.Status}}' }}'"
  register: postgresql_container_status
  changed_when: false
  failed_when: false
  when: not (postgresql_container_runtime_info.containers[0].State.Running | default(false) | bool)

- name: Gather postgresql container logs when not running
  ansible.builtin.command:
    cmd: podman logs --tail 200 postgresql
  register: postgresql_container_logs
  changed_when: false
  failed_when: false
  when: not (postgresql_container_runtime_info.containers[0].State.Running | default(false) | bool)

- name: Fail when postgresql container is not running on database node
  ansible.builtin.fail:
    msg: |
      postgresql container is not running on this database node.
      Service active rc: {{ postgresql_service_active.rc | default('n/a') }}
      Service enabled rc: {{ postgresql_service_enabled.rc | default('n/a') }}
      Container start rc: {{ postgresql_container_start.rc | default('n/a') }}
      Container status:
      {{ postgresql_container_status.stdout | default('n/a') }}

      Container logs (tail 200):
      {{ postgresql_container_logs.stdout | default('n/a') }}
  when: not (postgresql_container_runtime_info.containers[0].State.Running | default(false) | bool)

- name: Add firewalld rules
  ansible.builtin.include_tasks: firewalld.yml
  vars:
    __firewalld_state: enabled
