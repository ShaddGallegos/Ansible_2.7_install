---
- name: Install required packages (best effort)
  ansible.builtin.dnf:
    name:
      - sudo
      - openssh-server
      - openssh-clients
      - policycoreutils-python-utils
      - tar
      - gzip
      - curl
      - jq
      - rsync
      - podman
      - podman-docker
      - python3
      - python3-pip
    state: present
  when: ansible_os_family == 'RedHat'

- name: Ensure installer user exists for rootless podman
  ansible.builtin.user:
    name: "{{ aap27_menu_installer_remote_user }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure subuid entry exists for installer user
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ aap27_menu_installer_remote_user }}:"
    line: "{{ aap27_menu_installer_remote_user }}:100000:65536"
    create: true
    mode: "0644"
    state: present

- name: Ensure subgid entry exists for installer user
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ aap27_menu_installer_remote_user }}:"
    line: "{{ aap27_menu_installer_remote_user }}:100000:65536"
    create: true
    mode: "0644"
    state: present

- name: Enable lingering for installer user
  ansible.builtin.command: "loginctl enable-linger {{ aap27_menu_installer_remote_user }}"
  changed_when: false
  failed_when: false

- name: Get installer user UID
  ansible.builtin.command: "id -u {{ aap27_menu_installer_remote_user }}"
  register: aap27_menu_installer_uid
  changed_when: false

- name: Ensure user manager is running for installer user
  ansible.builtin.systemd:
    name: "user@{{ aap27_menu_installer_uid.stdout }}"
    state: started
  failed_when: false

- name: Wait for installer user DBus socket
  ansible.builtin.wait_for:
    path: "/run/user/{{ aap27_menu_installer_uid.stdout }}/bus"
    timeout: 30
  failed_when: false

- name: Enable rootless podman socket for installer user
  become: true
  become_user: "{{ aap27_menu_installer_remote_user }}"
  ansible.builtin.systemd_service:
    name: podman.socket
    enabled: true
    state: started
    scope: user
  failed_when: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap27_menu_installer_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap27_menu_installer_uid.stdout }}/bus"

- name: Ensure DOCKER_HOST compatibility variable in installer user bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ aap27_menu_installer_remote_user }}/.bashrc"
    regexp: '^export DOCKER_HOST="unix://\$XDG_RUNTIME_DIR/podman/podman.sock"$'
    line: 'export DOCKER_HOST="unix://$XDG_RUNTIME_DIR/podman/podman.sock"'
    create: true
    mode: "0644"

- name: Enable rootful podman socket service
  ansible.builtin.systemd:
    name: podman.socket
    enabled: true
    state: started
  failed_when: false

- name: Run podman system migrate for installer user
  become: true
  become_user: "{{ aap27_menu_installer_remote_user }}"
  ansible.builtin.command: podman system migrate
  changed_when: false
  failed_when: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap27_menu_installer_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap27_menu_installer_uid.stdout }}/bus"

- name: Login to registry.redhat.io as installer user
  become: true
  become_user: "{{ aap27_menu_installer_remote_user }}"
  ansible.builtin.shell: |
    set -o pipefail
    printf '%s\n' {{ aap27_menu_installer_registry_password | quote }} | \
    podman login registry.redhat.io --username {{ aap27_menu_installer_registry_username | quote }} --password-stdin
  args:
    executable: /bin/bash
  no_log: true
  changed_when: false
  failed_when: false
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ aap27_menu_installer_uid.stdout }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ aap27_menu_installer_uid.stdout }}/bus"
  when:
    - aap27_menu_installer_registry_username | length > 0
    - aap27_menu_installer_registry_password | length > 0

- name: Disable firewalld for installation
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false
  when: aap27_menu_installer_disable_firewall_for_install | bool

- name: Set runtime SELinux permissive
  ansible.builtin.command: setenforce 0
  changed_when: false
  failed_when: false
  when: aap27_menu_installer_set_selinux_permissive_for_install | bool

- name: Set SELinux config permissive
  ansible.builtin.replace:
    path: /etc/selinux/config
    regexp: "^SELINUX=.*"
    replace: SELINUX=permissive
  when: aap27_menu_installer_set_selinux_permissive_for_install | bool
