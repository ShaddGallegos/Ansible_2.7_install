---
# Controller authentication
# Prefer using an OAuth token. If token is empty, username/password is used.
aap_controller_host: "https://aap.example.com"
aap_validate_certs: false
aap_controller_oauthtoken: ""
aap_controller_username: "admin"
aap_controller_password: ""

# Controller objects
aap_org_name: "AAP 2.7 Install"
aap_inventory_name: "AAP 2.7 Install Inventory"
aap_inventory_description: "Inventory for AAP 2.7 installer workflow"

# SCM project
workflow_project_name: "Ansible_2.7_install"
workflow_project_url: "https://github.com/shaddgallegos/Ansible_2.7_install.git"
workflow_project_branch: "main"

# Credential names
machine_credential_name: "AAP Install Machine Credential"
registry_credential_name: "RH Registry Credential"

# Credential values (replace securely)
# Must be a non-root user (containerized installer preflight requires this).
machine_credential_username: "admin"
machine_credential_password: ""
registry_username: ""
registry_password: ""

# Template names
jt_prework_name: "AAP27 Prework"
jt_host_identity_name: "AAP27 Host Identity"
jt_download_name: "AAP27 Download Bundle"
jt_install_name: "AAP27 Install"
aap_workflow_template_name: "AAP27 End-to-End Install Workflow"

# Survey defaults
default_fqdn: "aap.example.com"
default_bundle_url: "https://access.cdn.redhat.com/content/origin/files/sha256/5c/5c0e1834c1ae609ce840865b5aa279b5c5bde9118856b326f77cc5c8bf92d9af/ansible-automation-platform-containerized-setup-bundle-2.7-2-x86_64.tar.gz"
default_bundle_file: "ansible-automation-platform-containerized-setup-bundle-2.7-2-x86_64.tar.gz"
